<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{{ .Title }}</title>
</head>
<body>
    {{ block "main" . }}{{ end }}

    {{- /* Build JS from root-level assets/js/main.js */ -}}
    {{- $js := resources.Get "js/main.js" | js.Build -}}
    <script src="{{ $js.RelPermalink }}" defer></script>
</body>
</html>
