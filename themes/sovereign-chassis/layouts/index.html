{{ define "main" }}
<main>
  <article class="bridge">
    {{ .Content }}
  </article>

  <script id="site-data" type="application/json">
    {{ jsonify .Site.Data.nodes | safeHTML }}
  </script>

  {{ partial "map.html" . }}
  <div id="field-note-panel" role="status" aria-live="polite" aria-atomic="true"></div>
</main>
{{ end }}
